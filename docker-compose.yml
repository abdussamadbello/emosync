services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: emosync
      POSTGRES_PASSWORD: emosync
      POSTGRES_DB: emosync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emosync -d emosync"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://emosync:emosync@db:5432/emosync
      DATABASE_URL_SYNC: postgresql://emosync:emosync@db:5432/emosync
      CORS_ORIGINS: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
