name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: emosync
          POSTGRES_PASSWORD: emosync
          POSTGRES_DB: emosync
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U emosync -d emosync"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql+asyncpg://emosync:emosync@localhost:5432/emosync
      DATABASE_URL_SYNC: postgresql://emosync:emosync@localhost:5432/emosync

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check app tests

      - name: Migrations
        run: alembic upgrade head

      - name: Tests
        run: pytest -q

      - name: Docker build (API image)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: emosync-api:ci
